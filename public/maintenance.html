<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="css/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance - CryptoPlexTrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(-45deg, #f0f7ff, #e8f4fe, #dbeef9, #f0f7ff);
            background-size: 400% 400%;
            animation: gradientBG 18s ease infinite;
            color: #1e293b;
            overflow: hidden;
            position: relative;
        }
        @keyframes gradientBG {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animated background glows */
        .bg-glow {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
        }
        .bg-glow::before, .bg-glow::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .12;
            animation: float 14s ease-in-out infinite;
        }
        .bg-glow::before {
            width: 500px; height: 500px;
            background: #005baa;
            top: -120px; left: -80px;
        }
        .bg-glow::after {
            width: 400px; height: 400px;
            background: #00a9e0;
            bottom: -100px; right: -60px;
            animation-delay: -7s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
        }

        .maintenance-card {
            position: relative; z-index: 1;
            text-align: center;
            max-width: 520px; width: 92%;
            padding: 48px 36px;
            background: rgba(255, 255, 255, .85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,91,170,.1);
            border-radius: 28px;
            box-shadow: 0 24px 64px rgba(0,91,170,.1);
        }

        .icon-wrap {
            width: 80px; height: 80px; border-radius: 24px;
            background: linear-gradient(135deg, #005baa, #00a9e0);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 28px;
            box-shadow: 0 8px 32px rgba(0,91,170,.2);
            animation: pulse-icon 2.5s ease-in-out infinite;
        }
        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(0,91,170,.2); }
            50% { transform: scale(1.05); box-shadow: 0 12px 40px rgba(0,91,170,.3); }
        }
        .icon-wrap svg { width: 40px; height: 40px; color: #fff; }

        h1 {
            font-size: 1.8rem; font-weight: 800; color: #1e293b;
            margin-bottom: 12px; line-height: 1.3;
        }
        h1 span {
            background: linear-gradient(90deg, #005baa, #00a9e0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .message {
            font-size: .95rem; color: #64748b;
            line-height: 1.7; margin-bottom: 32px;
        }
        #custom-message { margin-bottom: 24px; }

        .progress-bar {
            width: 100%; height: 4px;
            background: rgba(0,91,170,.08);
            border-radius: 4px; overflow: hidden;
            margin-bottom: 28px;
        }
        .progress-bar-fill {
            height: 100%; width: 30%;
            background: linear-gradient(90deg, #005baa, #00a9e0);
            border-radius: 4px;
            animation: progress-move 2s ease-in-out infinite;
        }
        @keyframes progress-move {
            0% { width: 10%; margin-left: 0; }
            50% { width: 50%; margin-left: 25%; }
            100% { width: 10%; margin-left: 90%; }
        }

        .status-row {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 10px 18px;
            background: rgba(245,158,11,.08);
            border: 1px solid rgba(245,158,11,.2);
            border-radius: 50px;
            margin-bottom: 20px;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #f59e0b;
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
        .status-text { font-size: .8rem; font-weight: 600; color: #b45309; letter-spacing: .3px; }

        .footer-text {
            font-size: .78rem; color: #94a3b8;
            margin-top: 8px;
        }
        .footer-text a { color: #005baa; text-decoration: none; font-weight: 500; }
        .footer-text a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .maintenance-card { padding: 36px 24px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="maintenance-card">
        <div class="icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M12 6.75a5.25 5.25 0 0 1 6.775-5.025.75.75 0 0 1 .313 1.248l-3.32 3.319c.063.475.276.934.641 1.299.365.365.824.578 1.3.64l3.318-3.319a.75.75 0 0 1 1.248.313 5.25 5.25 0 0 1-5.472 6.756c-1.018-.086-1.87.1-2.309.634L7.344 21.3A3.298 3.298 0 1 1 2.7 16.657l8.684-7.151c.533-.44.72-1.291.634-2.309A5.342 5.342 0 0 1 12 6.75ZM4.117 19.125a.75.75 0 0 1 .75-.75h.008a.75.75 0 0 1 .75.75v.008a.75.75 0 0 1-.75.75h-.008a.75.75 0 0 1-.75-.75v-.008Z" clip-rule="evenodd"/></svg>
        </div>
        <div class="status-row">
            <span class="status-dot"></span>
            <span class="status-text">MAINTENANCE IN PROGRESS</span>
        </div>
        <h1>We'll Be <span>Right Back</span></h1>
        <p class="message" id="custom-message">We're performing scheduled maintenance to improve your experience. This won't take long.</p>
        <div class="progress-bar"><div class="progress-bar-fill"></div></div>
        <p class="footer-text">CryptoPlexTrade &middot; <a href="mailto:support@cryptoplextrade.com">Contact Support</a></p>
    </div>

    <script>
    // Fetch custom message from server
    (async () => {
        try {
            const r = await fetch('/api/maintenance');
            if (r.ok) {
                const data = await r.json();
                if (data.message) {
                    document.getElementById('custom-message').textContent = data.message;
                }
            }
        } catch(e) {}

        // Auto-check if maintenance is over every 30 seconds
        setInterval(async () => {
            try {
                const r = await fetch('/api/maintenance');
                if (r.ok) {
                    const data = await r.json();
                    if (!data.active) window.location.href = '/';
                }
            } catch(e) {}
        }, 30000);
    })();
    </script>
</body>
</html>
