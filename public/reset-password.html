<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CryptoPlexTrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --blue-main:#005baa;--blue-light:#00a9e0;--blue-pale:#e8f4fe;--text-dark:#0f172a;--text-mid:#334155;--text-muted:#94a3b8;--border:#dde9f7;--shadow-b:rgba(0,91,170,0.14);--green:#16a34a;--red:#dc2626; }
        body { font-family:'Poppins',sans-serif;min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(135deg,#e8f4fe 0%,#f0f7ff 40%,#dbeef9 70%,#c8e5f5 100%);background-size:300% 300%;animation:bg-shift 18s ease infinite;color:var(--text-dark); }
        @keyframes bg-shift { 0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;} }
        .float-bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
        .float-bg svg{position:absolute;color:var(--blue-main);opacity:0.07;animation:icon-rise linear infinite;}
        .float-bg svg:nth-child(1){width:50px;left:10%;animation-duration:26s;animation-delay:-5s;}
        .float-bg svg:nth-child(2){width:40px;left:45%;animation-duration:30s;animation-delay:-12s;}
        .float-bg svg:nth-child(3){width:60px;left:75%;animation-duration:22s;animation-delay:-8s;}
        @keyframes icon-rise{0%{transform:translateY(110vh) rotate(0deg);opacity:0;}10%{opacity:0.07;}90%{opacity:0.07;}100%{transform:translateY(-10vh) rotate(540deg);opacity:0;}}

        .header{position:relative;z-index:10;padding:18px 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.6);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,91,170,.1);}
        .brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
        .brand-circle{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--blue-main),var(--blue-light));display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#fff;box-shadow:0 4px 12px var(--shadow-b);}
        .brand-name{font-size:1.15rem;font-weight:700;color:var(--text-dark);}

        .main{flex:1;display:flex;align-items:center;justify-content:center;padding:50px 20px 90px;position:relative;z-index:1;}

        .form-card{width:100%;max-width:440px;background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border:1px solid rgba(0,91,170,.12);border-radius:24px;padding:48px 44px;box-shadow:0 8px 32px rgba(0,91,170,.1),0 2px 8px rgba(0,0,0,.04),inset 0 1px 0 rgba(255,255,255,.9);animation:card-in .7s cubic-bezier(.34,1.4,.64,1) both;}
        @keyframes card-in{from{opacity:0;transform:translateY(30px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}

        .card-icon{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,var(--blue-main),var(--blue-light));display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:0 8px 24px var(--shadow-b);}
        .card-icon svg{width:28px;height:28px;color:#fff;}
        .card-title{text-align:center;font-size:1.65rem;font-weight:700;color:var(--text-dark);margin-bottom:6px;}
        .card-sub{text-align:center;font-size:.86rem;color:var(--text-muted);margin-bottom:28px;line-height:1.6;}

        #message{border-radius:10px;padding:12px 14px;font-size:.84rem;font-weight:500;margin-bottom:18px;display:none;}
        #message.success{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.25);color:var(--green);}
        #message.error{background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.2);color:var(--red);}

        .field{margin-bottom:16px;}
        .field-label{display:block;font-size:.8rem;font-weight:600;color:var(--text-mid);margin-bottom:7px;}
        .field-wrap{position:relative;}
        .field-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-muted);display:flex;pointer-events:none;}
        .field-icon svg{width:17px;height:17px;}
        .field-wrap input{width:100%;padding:13px 44px 13px 40px;background:#fafcff;border:1.5px solid var(--border);border-radius:10px;font-family:'Poppins',sans-serif;font-size:.92rem;color:var(--text-dark);outline:none;transition:border-color .2s,box-shadow .2s,background .2s;}
        .field-wrap input::placeholder{color:var(--text-muted);}
        .field-wrap input:focus{border-color:var(--blue-main);background:#fff;box-shadow:0 0 0 3px rgba(0,91,170,.1);}
        .pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0;display:flex;transition:color .2s;}
        .pw-eye:hover{color:var(--blue-main);}
        .pw-eye svg{width:17px;height:17px;}

        /* Strength bar */
        .strength-bar{margin-top:6px;height:4px;border-radius:4px;background:var(--border);overflow:hidden;}
        .strength-fill{height:100%;border-radius:4px;transition:width .3s,background .3s;width:0%;}
        .strength-label{font-size:.72rem;color:var(--text-muted);margin-top:4px;}

        .btn-submit{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:700;color:#fff;background:linear-gradient(90deg,var(--blue-main) 0%,var(--blue-light) 100%);background-size:200% 100%;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 6px 20px var(--shadow-b);transition:background-position .35s,transform .2s,box-shadow .2s;margin-top:8px;}
        .btn-submit:hover{background-position:100% 0;transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,91,170,.28);}
        .btn-submit::after{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.3),transparent);transition:left .45s;}
        .btn-submit:hover::after{left:140%;}

        footer{text-align:center;padding:16px;font-size:.76rem;color:var(--text-muted);position:relative;z-index:1;}
        .ticker-tape{position:fixed;bottom:0;left:0;right:0;background:#0f172a;border-top:2px solid var(--blue-main);padding:8px 0;z-index:300;overflow:hidden;white-space:nowrap;}
        .ticker-tape__track{display:inline-block;animation:ticker 40s linear infinite;}
        @keyframes ticker{to{transform:translateX(-50%);}}
        .ticker-tape__item{display:inline-flex;align-items:center;padding:0 22px;font-size:.83rem;}
        .ticker-tape__item .pair{font-weight:600;margin-right:9px;color:#64748b;}.ticker-tape__item .price{font-weight:500;margin-right:7px;color:#e2e8f0;}
        .change.up{color:#22d3a5;font-weight:600;}.change.down{color:#f87171;font-weight:600;}
    </style>
<link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
<div class="float-bg" aria-hidden="true">
    <svg viewBox="0 0 32 32" fill="currentColor"><path d="M21.94,13.11A7.49,7.49,0,0,0,16,4a7.5,7.5,0,0,0-6,12.22L5,21.27V24H7.6l4.49-4.49a7.5,7.5,0,0,0,10-6.39Z"/></svg>
    <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16,2,6,17.2l10,12.8,10-12.8Z"/></svg>
    <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16,2A14,14,0,1,0,30,16,14,14,0,0,0,16,2Zm0,26A12,12,0,1,1,28,16,12,12,0,0,1,16,28Z"/></svg>
</div>

<header class="header">
    <a href="index.html" class="brand">
        <div class="brand-circle">CP</div>
        <span class="brand-name">CryptoPlexTrade</span>
    </a>
</header>

<main class="main">
    <div class="form-card">
        <div class="card-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 0 0-5.25 5.25v3a3 3 0 0 0-3 3v6.75a3 3 0 0 0 3 3h10.5a3 3 0 0 0 3-3v-6.75a3 3 0 0 0-3-3v-3A5.25 5.25 0 0 0 12 1.5Zm3.75 8.25v-3a3.75 3.75 0 1 0-7.5 0v3h7.5Z" clip-rule="evenodd"/>
            </svg>
        </div>
        <h1 class="card-title">Set New Password</h1>
        <p class="card-sub">Choose a strong password for your account. Minimum 8 characters.</p>

        <div id="message"></div>

        <form id="reset-password-form" novalidate>
            <div class="field">
                <label class="field-label" for="new-password">New Password</label>
                <div class="field-wrap">
                    <span class="field-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 0 0-5.25 5.25v3a3 3 0 0 0-3 3v6.75a3 3 0 0 0 3 3h10.5a3 3 0 0 0 3-3v-6.75a3 3 0 0 0-3-3v-3A5.25 5.25 0 0 0 12 1.5Zm3.75 8.25v-3a3.75 3.75 0 1 0-7.5 0v3h7.5Z" clip-rule="evenodd"/></svg></span>
                    <input type="password" id="new-password" name="new-password" placeholder="Min. 8 characters" required>
                    <button type="button" class="pw-eye" id="toggle-pw1" aria-label="Toggle"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3.53 2.47a.75.75 0 0 0-1.06 1.06l18 18a.75.75 0 1 0 1.06-1.06l-18-18ZM22.676 12.553a11.249 11.249 0 0 1-2.631 4.31l-3.099-3.099a5.25 5.25 0 0 0-6.71-6.71L7.759 4.577a11.217 11.217 0 0 1 4.242-.827c4.97 0 9.185 3.223 10.675 7.69.12.362.12.752 0 1.113Z"/><path d="M15.75 12c0 .18-.013.357-.037.53l-4.244-4.243A3.75 3.75 0 0 1 15.75 12ZM12.25 15.75l-4.243-4.244a3.75 3.75 0 0 0 4.243 4.244ZM4.867 16.842l-1.634-1.635a11.25 11.25 0 0 1-1.909-3.655.75.75 0 0 1 0-.553C2.816 6.723 7.03 3.5 12.001 3.5c1.457 0 2.85.294 4.116.826L14.53 5.916A5.251 5.251 0 0 0 8.25 12a5.21 5.21 0 0 0 .617 2.47L4.867 16.842Z"/></svg></button>
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                <div class="strength-label" id="strength-label"></div>
            </div>
            <div class="field">
                <label class="field-label" for="confirm-password">Confirm New Password</label>
                <div class="field-wrap">
                    <span class="field-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 0 0-5.25 5.25v3a3 3 0 0 0-3 3v6.75a3 3 0 0 0 3 3h10.5a3 3 0 0 0 3-3v-6.75a3 3 0 0 0-3-3v-3A5.25 5.25 0 0 0 12 1.5Zm3.75 8.25v-3a3.75 3.75 0 1 0-7.5 0v3h7.5Z" clip-rule="evenodd"/></svg></span>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Repeat new password" required>
                    <button type="button" class="pw-eye" id="toggle-pw2" aria-label="Toggle"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3.53 2.47a.75.75 0 0 0-1.06 1.06l18 18a.75.75 0 1 0 1.06-1.06l-18-18ZM22.676 12.553a11.249 11.249 0 0 1-2.631 4.31l-3.099-3.099a5.25 5.25 0 0 0-6.71-6.71L7.759 4.577a11.217 11.217 0 0 1 4.242-.827c4.97 0 9.185 3.223 10.675 7.69.12.362.12.752 0 1.113Z"/><path d="M15.75 12c0 .18-.013.357-.037.53l-4.244-4.243A3.75 3.75 0 0 1 15.75 12ZM12.25 15.75l-4.243-4.244a3.75 3.75 0 0 0 4.243 4.244ZM4.867 16.842l-1.634-1.635a11.25 11.25 0 0 1-1.909-3.655.75.75 0 0 1 0-.553C2.816 6.723 7.03 3.5 12.001 3.5c1.457 0 2.85.294 4.116.826L14.53 5.916A5.251 5.251 0 0 0 8.25 12a5.21 5.21 0 0 0 .617 2.47L4.867 16.842Z"/></svg></button>
                </div>
            </div>
            <button type="submit" class="btn-submit" id="submit-btn">Reset Password</button>
        </form>
    </div>
</main>

<footer>&copy; 2026 CryptoPlexTrade. All Rights Reserved.</footer>
<div class="ticker-tape"><div class="ticker-tape__track" id="ticker-track"></div></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const resetForm = document.getElementById('reset-password-form');
    const msg = document.getElementById('message');
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) { msg.textContent='Invalid or missing reset token. Please request a new link.'; msg.className='error'; msg.style.display='block'; resetForm.style.display='none'; }

    /* Password toggles */
    document.getElementById('toggle-pw1').addEventListener('click',()=>{ const i=document.getElementById('new-password'); i.type=i.type==='password'?'text':'password'; });
    document.getElementById('toggle-pw2').addEventListener('click',()=>{ const i=document.getElementById('confirm-password'); i.type=i.type==='password'?'text':'password'; });

    /* Strength meter */
    document.getElementById('new-password').addEventListener('input', function() {
        const v = this.value;
        const fill = document.getElementById('strength-fill');
        const lbl = document.getElementById('strength-label');
        let score = 0;
        if (v.length >= 8) score++;
        if (/[A-Z]/.test(v)) score++;
        if (/[0-9]/.test(v)) score++;
        if (/[^A-Za-z0-9]/.test(v)) score++;
        const levels = [{w:'20%',c:'#dc2626',t:'Weak'},{w:'40%',c:'#f59e0b',t:'Fair'},{w:'70%',c:'#3b82f6',t:'Good'},{w:'100%',c:'#16a34a',t:'Strong'}];
        const l = levels[Math.max(0,score-1)] || levels[0];
        if(v.length===0){fill.style.width='0';lbl.textContent='';}else{fill.style.width=l.w;fill.style.background=l.c;lbl.textContent=l.t;lbl.style.color=l.c;}
    });

    resetForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const newPw = document.getElementById('new-password').value;
        const confirmPw = document.getElementById('confirm-password').value;
        const btn = document.getElementById('submit-btn');
        msg.style.display='none';
        if (newPw.length < 8) { alert('Password must be at least 8 characters.'); return; }
        if (newPw !== confirmPw) { alert('Passwords do not match.'); return; }
        btn.textContent='Resetting…'; btn.disabled=true;
        try {
            const res = await fetch('/api/reset-password', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token,newPassword:newPw}) });
            const result = await res.json();
            if (res.ok) {
                msg.textContent=result.message+' Redirecting to login…'; msg.className='success'; msg.style.display='block';
                resetForm.style.display='none';
                setTimeout(()=>window.location.href='login.html',3000);
            } else { throw new Error(result.message); }
        } catch(err) { msg.textContent=err.message||'An error occurred.'; msg.className='error'; msg.style.display='block'; btn.textContent='Reset Password'; btn.disabled=false; }
    });

    /* Ticker */
    (async()=>{
        const track=document.getElementById('ticker-track');
        const syms=['BTC','ETH','SOL','BNB','XRP','LTC','ADA','DOGE'];
        try{ const r=await fetch(`https://min-api.cryptocompare.com/data/pricemultifull?fsyms=${syms.join(',')}&tsyms=USD`); const d=await r.json(); let html=''; syms.forEach(s=>{const c=d.RAW?.[s]?.USD;if(!c)return;const dir=c.CHANGEPCT24HOUR>=0?'up':'down';html+=`<div class="ticker-tape__item"><span class="pair">${s}/USD</span><span class="price">${c.PRICE.toLocaleString('en-US',{style:'currency',currency:'USD'})}</span><span class="change ${dir}">${dir==='up'?'+':''}${c.CHANGEPCT24HOUR.toFixed(2)}% ${dir==='up'?'▲':'▼'}</span></div>`;});track.innerHTML=html+html;}catch(e){}
    })();
});
</script>
</body>
</html>
