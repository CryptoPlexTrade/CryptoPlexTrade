<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="css/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Order - CryptoPlexTrade</title>
    <meta name="description" content="Review and verify your crypto buy order before proceeding to payment.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
    <style>
        /* ── Order Summary Page ─────────────────────────── */
        body { overflow-y: auto; }

        .os-wrap {
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        /* Topbar */
        .os-topbar {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .os-brand {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none;
        }
        .os-brand__orb { text-decoration: none; }
        img.os-brand__orb { width: auto; height: 44px; border-radius: 16px; object-fit: contain; background: none !important; box-shadow: none !important; }
        .os-brand__name {
            font-size: 0.9rem; font-weight: 700; color: var(--text-1);
        }
        .os-topbar-right { display: flex; gap: 12px; align-items: center; }

        /* Page body */
        .os-main {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px 100px;
        }
        .os-container {
            width: 100%;
            max-width: 560px;
        }

        /* ── Step Progress ──────────────────────────────── */
        .steps {
            display: flex;
            align-items: flex-start;
            gap: 0;
            margin-bottom: 32px;
            position: relative;
        }
        .step-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        /* Connector line between steps */
        .step-item:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 18px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: var(--border);
            z-index: 0;
        }
        .step-item.done:not(:last-child)::after,
        .step-item.active:not(:last-child)::after {
            background: var(--primary);
        }

        .step-num {
            width: 36px; height: 44px;
            border-radius: 50%;
            border: 2px solid var(--border-mid);
            background: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 700;
            color: var(--text-3);
            position: relative; z-index: 1;
            transition: all 0.25s;
        }
        .step-item.active .step-num {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-color: transparent;
            color: white;
            box-shadow: 0 0 0 4px rgba(0,91,170,0.15);
        }
        .step-item.done .step-num {
            background: var(--primary);
            border-color: transparent;
            color: white;
        }
        .step-label {
            font-size: 0.72rem; font-weight: 600;
            color: var(--text-3);
            margin-top: 8px;
            text-align: center;
            white-space: nowrap;
        }
        .step-item.active .step-label { color: var(--primary-dark); }

        /* ── Summary Card ───────────────────────────────── */
        .summary-card {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .summary-card__header {
            padding: 22px 28px 18px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 14px;
            background: linear-gradient(135deg, #f0f7ff 0%, white 100%);
        }

        .summary-card__icon {
            width: 50px; height: 50px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .summary-card__icon svg { width: 24px; height: 24px; color: white; }

        .summary-card__titles h2 {
            font-size: 1.1rem; font-weight: 800;
            color: var(--text-1); margin: 0 0 2px;
        }
        .summary-card__titles p {
            font-size: 0.8rem; color: var(--text-3); margin: 0;
        }

        /* Summary rows */
        .summary-rows { padding: 6px 0; }

        .summary-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 28px;
            border-bottom: 1px solid var(--border);
            opacity: 0; transform: translateX(-12px);
            animation: row-in 0.4s ease forwards;
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-row:nth-child(1) { animation-delay: 0.05s; }
        .summary-row:nth-child(2) { animation-delay: 0.12s; }
        .summary-row:nth-child(3) { animation-delay: 0.19s; }
        .summary-row:nth-child(4) { animation-delay: 0.26s; }
        .summary-row:nth-child(5) { animation-delay: 0.33s; }
        @keyframes row-in { to { opacity: 1; transform: translateX(0); } }

        .summary-row__label {
            font-size: 0.825rem; font-weight: 600;
            color: var(--text-3);
        }
        .summary-row__value {
            font-size: 0.9rem; font-weight: 700;
            color: var(--text-1);
            text-align: right;
            max-width: 55%;
            word-break: break-all;
        }
        .summary-row--total {
            background: var(--primary-pale);
        }
        .summary-row--total .summary-row__label {
            font-size: 0.875rem; font-weight: 700; color: var(--primary-dark);
        }
        .summary-row--total .summary-row__value {
            font-size: 1.25rem; color: var(--primary);
        }

        /* CTA */
        .os-cta {
            padding: 22px 28px;
            border-top: 1px solid var(--border);
            background: white;
        }

        /* Security badges */
        .security-strip {
            display: flex; gap: 18px; justify-content: center;
            margin-top: 22px; flex-wrap: wrap;
        }
        .security-item {
            display: flex; align-items: center; gap: 5px;
            font-size: 0.72rem; color: var(--text-3); font-weight: 500;
        }
        .security-item svg { width: 13px; height: 13px; color: var(--green); }

        /* mobile */
        @media (max-width: 540px) {
            .os-topbar { padding: 0 16px; }
            .os-brand__name { display: none; }
            .summary-card__header, .summary-row, .os-cta { padding-left: 18px; padding-right: 18px; }
            .step-label { font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<div class="os-wrap">

    <!-- Topbar -->
    <header class="os-topbar">
        <a href="dashboard.html" class="os-brand">
            <img src="css/logo.jpg" alt="Logo" class="os-brand__orb" style="width: auto !important; height: 44px !important; max-height: 44px; border-radius: 16px !important; object-fit: contain !important; background: none !important; padding: 0 !important; box-shadow: none !important; overflow: visible !important;">
            <span class="os-brand__name">CryptoPlexTrade</span>
        </a>
        <div class="os-topbar-right">
            <a href="dashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
            <a href="#" id="logout-btn" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </header>

    <main class="os-main">
        <div class="os-container">

            <!-- Step indicator -->
            <div class="steps">
                <div class="step-item active">
                    <div class="step-num">1</div>
                    <span class="step-label">Verify Order</span>
                </div>
                <div class="step-item">
                    <div class="step-num">2</div>
                    <span class="step-label">Make Payment</span>
                </div>
                <div class="step-item">
                    <div class="step-num">3</div>
                    <span class="step-label">Confirm ID</span>
                </div>
            </div>

            <!-- Summary Card -->
            <div class="summary-card">
                <div class="summary-card__header">
                    <div class="summary-card__icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M2.273 5.625A4.483 4.483 0 0 1 5.25 4.5h13.5c1.141 0 2.183.425 2.977 1.125A3 3 0 0 0 18.75 3H5.25a3 3 0 0 0-2.977 2.625ZM2.273 8.625A4.483 4.483 0 0 1 5.25 7.5h13.5c1.141 0 2.183.425 2.977 1.125A3 3 0 0 0 18.75 6H5.25a3 3 0 0 0-2.977 2.625ZM5.25 9a3 3 0 0 0-3 3v6a3 3 0 0 0 3 3h13.5a3 3 0 0 0 3-3v-6a3 3 0 0 0-3-3H5.25Zm7.205 4.17a.75.75 0 0 0-1.41 0l-.498 1.502H9a.75.75 0 0 0 0 1.5h.943l-.41 1.232a.75.75 0 1 0 1.41.47l.512-1.545.51 1.537a.75.75 0 1 0 1.41-.47l-.41-1.232H14.25a.75.75 0 0 0 0-1.5h-1.547l-.498-1.502-.75 2.253Z"/></svg>
                    </div>
                    <div class="summary-card__titles">
                        <h2>Order Summary</h2>
                        <p>Please review your details before proceeding</p>
                    </div>
                </div>

                <div class="summary-rows">
                    <div class="summary-row">
                        <span class="summary-row__label">You are buying</span>
                        <span class="summary-row__value" id="summary-product-amount">—</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-row__label">Product Value</span>
                        <span class="summary-row__value" id="summary-usd">—</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-row__label">Miner Fee</span>
                        <span class="summary-row__value" id="summary-fee">—</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-row__label">Receiving Wallet</span>
                        <span class="summary-row__value" id="summary-wallet" style="font-size:0.78rem;font-family:monospace;">—</span>
                    </div>
                    <div class="summary-row summary-row--total">
                        <span class="summary-row__label">Total to Pay</span>
                        <span class="summary-row__value" id="summary-total">—</span>
                    </div>
                </div>

                <div class="os-cta">
                    <button id="proceed-to-payment" class="btn btn-primary btn-full btn-lg">
                        Proceed to Payment →
                    </button>
                    <div class="security-strip">
                        <div class="security-item">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 0 0-5.25 5.25v3a3 3 0 0 0-3 3v6.75a3 3 0 0 0 3 3h10.5a3 3 0 0 0 3-3v-6.75a3 3 0 0 0-3-3v-3A5.25 5.25 0 0 0 12 1.5Z" clip-rule="evenodd"/></svg>
                            256-bit SSL
                        </div>
                        <div class="security-item">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M12.516 2.17a.75.75 0 0 0-1.032 0 11.209 11.209 0 0 1-7.877 3.08.75.75 0 0 0-.722.515A12.74 12.74 0 0 0 2.25 9.75c0 5.942 4.064 10.933 9.563 12.348a.749.749 0 0 0 .374 0c5.499-1.415 9.563-6.406 9.563-12.348 0-1.39-.223-2.73-.635-3.985a.75.75 0 0 0-.722-.516l-.143.001c-2.996 0-5.717-1.17-7.734-3.08Z" clip-rule="evenodd"/></svg>
                            Secured &amp; Verified
                        </div>
                        <div class="security-item">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M8.603 3.799A4.49 4.49 0 0 1 12 2.25c1.357 0 2.573.6 3.397 1.549a4.49 4.49 0 0 1 3.498 1.307 4.491 4.491 0 0 1 1.307 3.497A4.49 4.49 0 0 1 21.75 12a4.49 4.49 0 0 1-1.549 3.397 4.491 4.491 0 0 1-1.307 3.497 4.491 4.491 0 0 1-3.497 1.307A4.49 4.49 0 0 1 12 21.75a4.49 4.49 0 0 1-3.397-1.549 4.49 4.49 0 0 1-3.498-1.306 4.491 4.491 0 0 1-1.307-3.498A4.49 4.49 0 0 1 2.25 12c0-1.357.6-2.573 1.549-3.397a4.49 4.49 0 0 1 1.307-3.497 4.49 4.49 0 0 1 3.497-1.307Zm7.007 6.387a.75.75 0 1 0-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 0 0-1.06 1.06l2.25 2.25a.75.75 0 0 0 1.14-.094l3.75-5.25Z" clip-rule="evenodd"/></svg>

</div>

<!-- Ticker Tape -->
<div class="ticker-tape"><div class="ticker-tape__track"></div></div>

<script src="inactivity-timer.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }
    const csrfToken = getCookie('csrf-token');

    const orderDetails = JSON.parse(localStorage.getItem('buyOrderDetails'));

    // Page Protection: Check for both a valid session and order details
    fetch('/api/user/me', { credentials: 'include' })
        .then(async response => {
            if (response.status === 401 || response.status === 403 || !orderDetails) {
                alert('Your session has expired or order details are missing. Please log in and try again.');
                window.location.href = 'trade.html';
                return;
            }
            if (response.ok) {
                const user = await response.json();
                if (user.kyc_status === 'unverified') {
                    window.location.href = 'kyc.html';
                    return;
                } else if (user.kyc_status === 'pending') {
                    showKycPendingOverlay();
                    return;
                }
                populateSummary(orderDetails);
            }
        }).catch(() => window.location.href = 'login.html');

    function showKycPendingOverlay() {
        const overlay = document.createElement('div');
        overlay.style.cssText = `
            position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
            background:rgba(15,23,42,0.75);backdrop-filter:blur(6px);padding:20px;
        `;
        overlay.innerHTML = `
            <div style="background:#fff;border-radius:20px;padding:40px 36px;max-width:440px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,91,170,0.2);">
                <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#f59e0b);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:2rem;">⏳</div>
                <h2 style="font-size:1.4rem;font-weight:700;color:#0f172a;margin-bottom:10px;">Verification Under Review</h2>
                <p style="color:#64748b;font-size:0.95rem;line-height:1.7;margin-bottom:28px;">
                    Your KYC documents have been submitted and are currently being reviewed by our compliance team.<br><br>
                    <strong style="color:#0f172a;">Trading will be unlocked once your account is approved.</strong><br>
                    This usually takes <em>1–24 hours</em>.
                </p>
                <a href="dashboard.html" style="display:inline-block;padding:13px 32px;background:linear-gradient(90deg,#005baa,#00a9e0);color:#fff;border-radius:12px;font-weight:700;text-decoration:none;font-size:0.95rem;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
                    ← Back to Dashboard
                </a>
            </div>
        `;
        document.body.appendChild(overlay);
    }


    function populateSummary(details) {
        // Calculate real crypto quantity using the live price at the time of order
        const livePrice = parseFloat(details.livePrice);
        const usdAmount = parseFloat(details.usdAmount);
        const cryptoQty = (livePrice && usdAmount) ? (usdAmount / livePrice) : null;
        
        const ticker = details.product.replace('_TRC20', '').replace('_ERC20', '');
        const productLabel = details.product === 'USDT_TRC20' ? 'USDT (TRC-20)'
                           : details.product === 'USDT_ERC20' ? 'USDT (ERC-20)'
                           : details.product;
        
        let qtyDisplay = '—';
        if (cryptoQty !== null) {
            const precision = (ticker === 'BTC' || ticker === 'ETH') ? 8 : 2;
            qtyDisplay = `${cryptoQty.toFixed(precision)} ${ticker}`;
        }

        document.getElementById('summary-product-amount').textContent = qtyDisplay;
        document.getElementById('summary-usd').textContent = `$${usdAmount.toFixed(2)}`;
        document.getElementById('summary-fee').textContent = `₵${parseFloat(details.feeGhs).toFixed(2)}`;
        document.getElementById('summary-total').textContent = `₵${parseFloat(details.totalPay).toFixed(2)}`;
        document.getElementById('summary-wallet').textContent = details.walletAddress;
    }

    document.getElementById('proceed-to-payment').addEventListener('click', function() {
        window.location.href = 'payment_method.html';
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', async (e) => {
        e.preventDefault();
        localStorage.removeItem('buyOrderDetails');
        const response = await fetch('/api/logout', { method: 'POST', headers: { 'X-CSRF-Token': csrfToken } });
        if (response.ok) window.location.href = 'login.html';
    });

    // --- Ticker Tape (Binance 24hr stats) ---
    const tickerTrack = document.querySelector('.ticker-tape__track');
    const tickerPairs = ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT','LTCUSDT','ADAUSDT','DOGEUSDT'];

    async function fetchLiveRates() {
        try {
            const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${JSON.stringify(tickerPairs)}`);
            if (!r.ok) throw new Error();
            const data = await r.json();
            let html = '';
            data.forEach(item => {
                const sym = item.symbol.replace('USDT', '');
                const price = parseFloat(item.lastPrice);
                const changePct = parseFloat(item.priceChangePercent);
                const dir = changePct >= 0 ? 'up' : 'down';
                const sign = dir === 'up' ? '+' : '';
                html += `<div class="ticker-tape__item"><span class="pair">${sym}/USD</span><span class="price">${price.toLocaleString('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2})}</span><span class="change ${dir}">${sign}${changePct.toFixed(2)}% ${dir==='up'?'▲':'▼'}</span></div>`;
            });
            tickerTrack.innerHTML = html + html;
        } catch(e) { console.error('Ticker error', e); }
    }
    fetchLiveRates();
    setInterval(fetchLiveRates, 60000);
});
</script>
