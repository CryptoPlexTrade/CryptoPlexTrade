                    <form id="trade-form" novalidate>
                        <!-- Custom Asset Selector -->

                            <span class="asset-select-label">Select Asset</span>
                            <div class="asset-select-trigger" id="asset-select-trigger" role="button" tabindex="0" aria-haspopup="listbox" aria-expanded="false">
                                <div class="asset-select-current">
                                    <img id="asset-badge" src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons@master/svg/color/btc.svg" alt="BTC" style="width:32px;height:32px;border-radius:50%;object-fit:contain;background:#f8fafc;border:1px solid #e2e8f0;padding:2px;flex-shrink:0;" onerror="this.style.display='none'">
                                    <span class="asset-select-name" id="asset-select-name">Bitcoin (BTC)</span>
                                </div>
                                <svg class="dropdown-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
                            </div>
                            <ul class="asset-select-dropdown" id="asset-select-dropdown" role="listbox">
                                <li class="asset-option selected" data-value="BTC" data-logo="btc" data-label="Bitcoin (BTC)" role="option">
                                    <img src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons@master/svg/color/btc.svg" alt="BTC" style="width:32px;height:32px;border-radius:50%;object-fit:contain;background:#f8fafc;border:1px solid #e2e8f0;padding:2px;flex-shrink:0;" onerror="this.style.display='none'">
                                    <div class="asset-option__info">
                                        <span class="asset-option__name">Bitcoin</span>
                                        <span class="asset-option__ticker">BTC</span>
                                    </div>
                                </li>
                                <li class="asset-option" data-value="ETH" data-logo="eth" data-label="Ethereum (ETH)" role="option">
                                    <img src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons@master/svg/color/eth.svg" alt="ETH" style="width:32px;height:32px;border-radius:50%;object-fit:contain;background:#f8fafc;border:1px solid #e2e8f0;padding:2px;flex-shrink:0;" onerror="this.style.display='none'">
                                    <div class="asset-option__info">
                                        <span class="asset-option__name">Ethereum</span>
                                        <span class="asset-option__ticker">ETH</span>
                                    </div>
                                </li>
                                <li class="asset-option" data-value="USDT_TRC20" data-logo="usdt" data-label="Tether (TRC-20)" role="option">
                                    <img src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons@master/svg/color/usdt.svg" alt="USDT" style="width:32px;height:32px;border-radius:50%;object-fit:contain;background:#f8fafc;border:1px solid #e2e8f0;padding:2px;flex-shrink:0;" onerror="this.style.display='none'">
                                    <div class="asset-option__info">
                                        <span class="asset-option__name">Tether (TRC-20)</span>
                                        <span class="asset-option__ticker">USDT_TRC20</span>
                                    </div>
                                </li>
                                <li class="asset-option" data-value="USDT_ERC20" data-logo="usdt" data-label="Tether (ERC-20)" role="option">
                                    <img src="https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons@master/svg/color/usdt.svg" alt="USDT" style="width:32px;height:32px;border-radius:50%;object-fit:contain;background:#f8fafc;border:1px solid #e2e8f0;padding:2px;flex-shrink:0;" onerror="this.style.display='none'">
                                    <div class="asset-option__info">
                                        <span class="asset-option__name">Tether (ERC-20)</span>
                                        <span class="asset-option__ticker">USDT_ERC20</span>
                                    </div>
                                </li>
                            </ul>
                            <!-- Hidden native select — JS reads productSelect.value from here -->
                            <select id="product" name="product" class="asset-select-native">
                                <option value="BTC" selected>Bitcoin (BTC)</option>
                                <option value="ETH">Ethereum (ETH)</option>
                                <option value="USDT_TRC20">Tether (TRC-20)</option>
                                <option value="USDT_ERC20">Tether (ERC-20)</option>

                        <!-- Live Market Price Strip -->

                        <!-- Split row: USD input | Crypto quantity -->

                            </div>
                            <div class="float-group" style="flex:1;margin-bottom:0;position:relative;">
                                <input type="text" id="crypto-amount-display" readonly placeholder=" "
                                    style="border-left:1.5px dashed #c7dfff;border-radius:0 9px 9px 0;background:#f0f7ff;color:#005baa;font-weight:700;font-size:0.88rem;cursor:default;">
                                <label style="position:absolute;top:9px;left:14px;font-size:0.67rem;color:#005baa;font-weight:600;letter-spacing:0.3px;pointer-events:none;">You will receive</label>
                            </div>

                        <div class="float-group">
                            <input type="number" id="ghs-amount" name="ghs-amount" required placeholder=" " step="0.01" min="0">
                            <label for="ghs-amount" id="ghs-label">Amount (GH₵)</label>
                        </div>

                        <!-- Custom Miner Fee Selector -->
                        <div class="asset-select-wrap" id="miner-fee-group">
                            <span class="asset-select-label">Miner Fee</span>
                            <div class="asset-select-trigger" id="miner-trigger" role="button" tabindex="0" aria-haspopup="listbox" aria-expanded="false">
                                <div class="asset-select-current">
                                    <div class="asset-badge" id="miner-badge" style="background:linear-gradient(135deg,#f7931a,#fbbf24);">⚡</div>
                                    <span class="asset-select-name" id="miner-name">Select fee tier</span>
                                </div>
                                <svg class="dropdown-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
                            </div>
                            <ul class="asset-select-dropdown" id="miner-dropdown" role="listbox"></ul>
                            <!-- Hidden native select — JS reads minerFeeSelect.value from here -->
                            <select id="miner-fee" name="miner-fee" class="asset-select-native"></select>
                        </div>

                        <div class="float-group">
                            <input type="text" id="fee-ghs" name="fee-ghs" placeholder=" " readonly>
                            <label for="fee-ghs">Fee (GH₵)</label>
                        </div>

                        <div class="float-group">
                            <input type="text" id="total-pay" name="total-pay" placeholder=" " readonly>
                            <label for="total-pay">Total to Pay (GH₵)</label>
                        </div>

                        <div class="float-group" id="wallet-address-group">
                            <input type="text" id="wallet-address" name="wallet-address" required placeholder=" " autocomplete="off" spellcheck="false">
                            <label for="wallet-address" id="wallet-label">Your Wallet Address</label>
                            <div id="wallet-validation-msg" style="display:none;font-size:.78rem;font-weight:600;padding:5px 2px 0;transition:all .2s;"></div>
                        </div>

                        <label class="trade-checkbox">
                            <input type="checkbox" id="terms" name="terms" required>
                            I agree to the <a href="terms.html" target="_blank">Terms &amp; Agreement</a>
                        </label>

                        <button type="submit" id="proceed-btn" class="btn btn-primary btn-full btn-lg">
                            Proceed →
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="ticker-tape"><div class="ticker-tape__track"></div></div>

<script src="inactivity-timer.js"></script>
<script src="chat-widget.js"></script>
<script>
(function () {
    // --- Sidebar ---
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    document.getElementById('hamburger-btn').addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('open'); });
    overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); });

    // --- Logout ---
    document.getElementById('logout-btn').addEventListener('click', async (e) => {
        e.preventDefault();
        try { const r = await fetch('/api/logout', { method: 'POST' }); if (r.ok) window.location.href = 'login.html'; }
        catch (err) { console.error(err); }
    });

    // --- KYC Guard ---
    async function enforceKyc() {
        try {
            const res = await fetch('/api/user/me', { credentials: 'include' });
            if (res.status === 401 || res.status === 403) { window.location.href = 'login.html'; return; }
            if (res.ok) {
                const user = await res.json();
                if (user.kyc_status === 'unverified' || user.kyc_status === 'rejected') {
                    window.location.href = 'kyc.html';
                } else if (user.kyc_status === 'pending') {
                    showKycPendingOverlay();
                }
                // 'approved' → allow through normally
            }
        } catch (e) {}
    }

    function showKycPendingOverlay() {
        const overlay = document.createElement('div');
        overlay.id = 'kyc-pending-overlay';
        overlay.style.cssText = `
            position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
            background:rgba(15,23,42,0.75);backdrop-filter:blur(6px);padding:20px;
        `;
        overlay.innerHTML = `
            <div style="background:#fff;border-radius:20px;padding:40px 36px;max-width:440px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,91,170,0.2);position:relative;">
                <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#f59e0b);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:2rem;">⏳</div>
                <h2 style="font-size:1.4rem;font-weight:700;color:#0f172a;margin-bottom:10px;">Verification Under Review</h2>
                <p style="color:#64748b;font-size:0.95rem;line-height:1.7;margin-bottom:28px;">
                    Your KYC documents have been submitted and are currently being reviewed by our compliance team.<br><br>
                    <strong style="color:#0f172a;">Trading will be unlocked once your account is approved.</strong><br>
                    This usually takes <em>1–24 hours</em>.
                </p>
                <a href="dashboard.html" style="display:inline-block;padding:13px 32px;background:linear-gradient(90deg,#005baa,#00a9e0);color:#fff;border-radius:12px;font-weight:700;text-decoration:none;font-size:0.95rem;transition:opacity 0.2s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
                    ← Back to Dashboard
                </a>
            </div>
        `;
        document.body.appendChild(overlay);
    }

    enforceKyc();


    const buyTab           = document.getElementById('buy-tab');
    const sellTab          = document.getElementById('sell-tab');
    const usdAmountInput   = document.getElementById('usd-amount');
    const ghsAmountInput   = document.getElementById('ghs-amount');
    const minerFeeSelect   = document.getElementById('miner-fee');
    const feeGhsInput      = document.getElementById('fee-ghs');
    const totalPayInput    = document.getElementById('total-pay');
    const walletLabel      = document.getElementById('wallet-label');
    const rateInfo         = document.getElementById('rate-info');
    const usdLabel         = document.getElementById('usd-label');
    const ghsLabel         = document.getElementById('ghs-label');
    const minerFeeGroup    = document.getElementById('miner-fee-group');
    const feeGhsGroup      = feeGhsInput.parentElement;
    const totalPayGroup    = totalPayInput.parentElement;
    const walletAddressGroup = document.getElementById('wallet-address-group');
    const productSelect    = document.getElementById('product');
    const tradeForm        = document.getElementById('trade-form');

    let currentMode = 'buy';
    let rates = {};
    let livePrices = {}; // Live crypto USD prices from CryptoCompare

    async function fetchRates() {
        try {
            const r = await fetch('/api/rates');
            if (r.status === 401 || r.status === 403) { window.location.href = 'login.html'; return; }
            if (!r.ok) throw new Error('Could not fetch rates');
            rates = await r.json();
            populateMinerFees();
            updateUI();
        } catch (e) { console.error(e); rateInfo.textContent = 'Could not load rates.'; }
    }

    // ── Live Market Price Helpers (Binance API) ─────────────────────────
    // Map product ID → Binance trading pair symbol
    function getCryptoSymbol(product) {
        if (product === 'USDT_TRC20' || product === 'USDT_ERC20') return 'USDT';
        return product; // BTC, ETH
    }

    // Fetch live USD prices from Binance for all traded assets
    async function fetchLivePrices() {
        try {
            // Binance symbols: BTCUSDT, ETHUSDT (USDT is always ~$1)
            const pairs = JSON.stringify(['BTCUSDT', 'ETHUSDT']);
            const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbols=${pairs}`);
            if (!r.ok) return;
            const data = await r.json();
            // Normalize into { BTC:{USD:77521}, ETH:{USD:2456}, USDT:{USD:1} }
            livePrices = { USDT: { USD: 1 } };
            data.forEach(item => {
                const sym = item.symbol.replace('USDT', '');
                livePrices[sym] = { USD: parseFloat(item.price) };
            });
            updateLivePriceDisplay(productSelect.value);
        } catch (e) {
            console.warn('[Live Price] Binance fetch failed:', e.message);
        }
    }

    // Update the live-price-strip label
    function updateLivePriceDisplay(product) {
        const el = document.getElementById('live-price-value');
        if (!el) return;
        const symbol = getCryptoSymbol(product);
        const price = livePrices[symbol]?.USD;
        if (price) {
            el.textContent = `1 ${symbol} = $${price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        } else {
            el.textContent = 'Price unavailable';
        }
    }

    // Show estimated crypto quantity in the right-side input box
    function updateCryptoAmountDisplay(usd, product) {
        const el = document.getElementById('crypto-amount-display');
        if (!el) return;
        const symbol = getCryptoSymbol(product);
        const price  = livePrices[symbol]?.USD;
        if (!price || !usd || usd <= 0) { 
            el.value = ''; 
            return; 
        }
        const qty    = usd / price;
        const ticker = product.replace('_TRC20', '').replace('_ERC20', '');
        const qtyStr = qty < 0.001 ? qty.toFixed(8) : qty < 1 ? qty.toFixed(6) : qty.toFixed(4);
        el.value = `≈ ${qtyStr} ${ticker}`;
    }

    const FEE_META = {
        'Priority': { bg: 'linear-gradient(135deg,#f7931a,#fbbf24)', emoji: '🔥' },
        'Standard': { bg: 'linear-gradient(135deg,var(--primary),var(--primary-light))', emoji: '⚡' },
        'Economy':  { bg: 'linear-gradient(135deg,#16a34a,#22c55e)', emoji: '🌱' },
    };

    function populateMinerFees() {
        if (!minerFeeSelect) return;
        const p = productSelect.value;
        if (!rates[p] || !rates[p].minerFees) return;

        minerFeeSelect.innerHTML = '';
        const dropdownList = document.getElementById('miner-dropdown');
        if (!dropdownList) return;
        dropdownList.innerHTML = '';

        // Sort fees cheapest-first so Economy is always the default
        const sortedFees = [...rates[p].minerFees].sort((a, b) => a.value - b.value);

        sortedFees.forEach((fee, idx) => {
            // Hidden native option
            const opt = document.createElement('option');
            opt.value = fee.value;
            opt.textContent = `${fee.name} ($${fee.value})`;
            if (idx === 0) opt.selected = true;
            minerFeeSelect.appendChild(opt);

            // Custom list item
            const meta = FEE_META[fee.name] || { bg: 'linear-gradient(135deg,var(--primary),var(--primary-light))', emoji: '⚡' };
            const li = document.createElement('li');
            li.className = 'asset-option' + (idx === 0 ? ' selected' : '');
            li.dataset.value   = fee.value;
            li.dataset.name    = `${fee.name} ($${fee.value})`;
            li.dataset.badgeBg = meta.bg;
            li.dataset.emoji   = meta.emoji;
            li.setAttribute('role', 'option');
            li.innerHTML = `
                <div class="asset-badge" style="background:${meta.bg};font-size:1rem;">${meta.emoji}</div>
                <div class="asset-option__info">
                    <span class="asset-option__name">${fee.name}</span>
                    <span class="asset-option__ticker">$${fee.value} USD</span>
                </div>
            `;
            dropdownList.appendChild(li);
        });

        // Set initial trigger display to the cheapest fee (first after sort)
        const first = sortedFees[0];
        if (first) {
            const meta = FEE_META[first.name] || FEE_META['Standard'];
            document.getElementById('miner-badge').style.background = meta.bg;
            document.getElementById('miner-badge').textContent = meta.emoji;
            document.getElementById('miner-name').textContent = `${first.name} ($${first.value})`;
        }

        // Wire up click events on newly built items
        dropdownList.querySelectorAll('.asset-option').forEach(opt => {
            opt.addEventListener('click', () => {
                const val   = opt.dataset.value;
                const name  = opt.dataset.name;
                const bg    = opt.dataset.badgeBg;
                const emoji = opt.dataset.emoji;

                document.getElementById('miner-badge').style.background = bg;
                document.getElementById('miner-badge').textContent = emoji;
                document.getElementById('miner-name').textContent = name;

                dropdownList.querySelectorAll('.asset-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');

                minerFeeSelect.value = val;
                minerFeeSelect.dispatchEvent(new Event('change'));

                const wrap = document.getElementById('miner-fee-group');
                const trigger = document.getElementById('miner-trigger');
                if (wrap && trigger) {
                    wrap.classList.remove('open');
                    trigger.setAttribute('aria-expanded', 'false');
                }
            });
        });
        
        // Retrigger calculation so the USD amount parses the new fee immediately
        calculate('usd');
    }

    function calculate(source) {
        const p = productSelect.value;
        if (!rates[p]) return;
        const usd = parseFloat(usdAmountInput.value) || 0;
        const ghs = parseFloat(ghsAmountInput.value) || 0;
        const minerFeeUSD = parseFloat(minerFeeSelect.value) || 0;
        const rate = currentMode === 'buy' ? rates[p].buy : rates[p].sell;

        if (currentMode === 'buy') {
            if (source === 'usd') { ghsAmountInput.value = (usd * rate).toFixed(2); }
            else { usdAmountInput.value = (ghs / rate).toFixed(2); }
            const finalGhs = parseFloat(ghsAmountInput.value) || 0;
            const minerGhs = minerFeeUSD * rate;
            feeGhsInput.value = minerGhs.toFixed(2);
            totalPayInput.value = (finalGhs + minerGhs).toFixed(2);
        } else {
            if (source === 'usd') { ghsAmountInput.value = (usd * rate).toFixed(2); }
            else { usdAmountInput.value = (ghs / rate).toFixed(8); }
            feeGhsInput.value = '0.00';
            totalPayInput.value = ghsAmountInput.value;
        }
        // Update live crypto quantity display
        updateCryptoAmountDisplay(parseFloat(usdAmountInput.value) || 0, p);
    }

    function updateUI() {
        const p = productSelect.value;
        if (!rates[p]) return;
        if (currentMode === 'buy') {
            rateInfo.textContent = `Buying ${p} @ ₵${rates[p].buy.toFixed(2)} / $`;
            usdLabel.textContent = 'Enter Amount to Buy';
            ghsLabel.textContent = 'GH₵ to Pay';
            walletLabel.textContent = `Your ${p} Address`;
            minerFeeGroup.style.display = '';
            feeGhsGroup.style.display = '';
            totalPayGroup.style.display = '';
            walletAddressGroup.style.display = '';
        } else {
            rateInfo.textContent = `Selling ${p} @ ₵${rates[p].sell.toFixed(2)} / $`;
            usdLabel.textContent = 'Amount to Sell';
            ghsLabel.textContent = 'You Will Receive (GH₵)';
            minerFeeGroup.style.display = 'none';
            feeGhsGroup.style.display = 'none';
            totalPayGroup.style.display = 'none';
            walletAddressGroup.style.display = 'none';
        }
        calculate('usd');
    }

    buyTab.addEventListener('click', () => {
        currentMode = 'buy'; buyTab.classList.add('active'); sellTab.classList.remove('active');
        usdAmountInput.value = ''; ghsAmountInput.value = ''; updateUI();
    });
    sellTab.addEventListener('click', () => {
        currentMode = 'sell'; sellTab.classList.add('active'); buyTab.classList.remove('active');
        usdAmountInput.value = ''; ghsAmountInput.value = ''; updateUI();
    });

    usdAmountInput.addEventListener('input', () => calculate('usd'));
    ghsAmountInput.addEventListener('input', () => calculate('ghs'));
    productSelect.addEventListener('change', updateUI);

    // ── Crypto Address Validator ─────────────────────────────
    const ADDR_RULES = {
        BTC:        { pattern: /^(1[a-km-zA-HJ-NP-Z1-9]{25,34}|3[a-km-zA-HJ-NP-Z1-9]{25,34}|bc1[a-z0-9]{39,59})$/, hint: 'BTC: starts with 1, 3, or bc1 · 26–62 characters' },
        ETH:        { pattern: /^0x[0-9a-fA-F]{40}$/, hint: 'ETH: starts with 0x · 42 characters total' },
        USDT_TRC20: { pattern: /^T[1-9A-HJ-NP-Za-km-z]{33}$/, hint: 'TRC-20: starts with T · 34 characters' },
        USDT_ERC20: { pattern: /^0x[0-9a-fA-F]{40}$/, hint: 'ERC-20: starts with 0x · 42 characters total' },
    };

    const walletInput  = document.getElementById('wallet-address');
    const walletMsg    = document.getElementById('wallet-validation-msg');
    let   walletValid  = false;

    function validateWallet() {
        const addr = walletInput.value.trim();
        const p    = productSelect.value;
        const rule = ADDR_RULES[p];
        if (!rule) return;

        if (!addr) {
            walletMsg.style.display = 'none';
            walletInput.style.borderColor = '';
            walletValid = false;
            return;
        }
        if (rule.pattern.test(addr)) {
            walletMsg.innerHTML = `<span style="color:#16a34a">✓ Valid ${p.replace('_',' ')} address</span>`;
            walletInput.style.borderColor = '#16a34a';
            walletMsg.style.display = 'block';
            walletValid = true;
        } else {
            walletMsg.innerHTML = `<span style="color:#dc3545">✗ Invalid address — <em>${rule.hint}</em></span>`;
            walletInput.style.borderColor = '#dc3545';
            walletMsg.style.display = 'block';
            walletValid = false;
        }
    }

    walletInput.addEventListener('input', validateWallet);
    // Re-validate when product changes (rules differ per coin)
    productSelect.addEventListener('change', validateWallet);

    tradeForm.addEventListener('submit', function (e) {
        e.preventDefault();
        const usdAmount = parseFloat(usdAmountInput.value);
        const walletAddress = walletInput.value.trim();
        const termsChecked = document.getElementById('terms').checked;

        if (currentMode === 'buy') {
            if (!usdAmount || usdAmount <= 0) { alert('Please enter a valid amount to buy.'); return; }
            if (!walletAddress) { alert('Please enter your wallet address.'); return; }
            if (!walletValid) {
                walletInput.focus();
                walletMsg.style.display = 'block';
                alert('The wallet address you entered doesn\'t look valid for ' + productSelect.value + '. Please double-check it.');
                return;
            }
            if (!termsChecked) { alert('You must agree to the Terms & Agreement.'); return; }
            const p = productSelect.value;
            localStorage.setItem('buyOrderDetails', JSON.stringify({
                product: p, usdAmount: usdAmountInput.value, productAmount: usdAmount,
                ghsAmount: ghsAmountInput.value, feeGhs: feeGhsInput.value,
                totalPay: totalPayInput.value, minerFeeValue: parseFloat(minerFeeSelect.value) || 0,
                walletAddress: walletAddress, rate: rates[p].buy,
                livePrice: livePrices[getCryptoSymbol(p)]?.USD || null
            }));
            window.location.href = 'order_summary.html';
        } else {
            if (!usdAmount || usdAmount <= 0) { alert('Please enter a valid amount to sell.'); return; }
            if (!termsChecked) { alert('You must agree to the Terms & Agreement.'); return; }
            const p = productSelect.value;
            localStorage.setItem('sellOrderDetails', JSON.stringify({
                product: p, productAmount: usdAmountInput.value,
                ghsToReceive: ghsAmountInput.value, rate: rates[p].sell,
                livePrice: livePrices[getCryptoSymbol(p)]?.USD || null
            }));
            window.location.href = 'sell_order_summary.html';
        }
    });

    fetchRates();
    fetchLivePrices();                        // Fetch live prices on load
    setInterval(fetchLivePrices, 30000);      // Refresh every 30 seconds

    // --- Ticker (Binance 24hr stats) ---
    const tickerTrack = document.querySelector('.ticker-tape__track');
    const tickerPairs = ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT','LTCUSDT','ADAUSDT','DOGEUSDT'];
    async function fetchLiveRates() {
        try {
            const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${JSON.stringify(tickerPairs)}`);
            if (!r.ok) throw new Error();
            const data = await r.json();
            let html = '';
            data.forEach(item => {
                const sym = item.symbol.replace('USDT', '');
                const price = parseFloat(item.lastPrice);
                const changePct = parseFloat(item.priceChangePercent);
                const dir = changePct >= 0 ? 'up' : 'down';
                const sign = dir === 'up' ? '+' : '';
                html += `<div class="ticker-tape__item"><span class="pair">${sym}/USD</span><span class="price">${price.toLocaleString('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2})}</span><span class="change ${dir}">${sign}${changePct.toFixed(2)}% ${dir==='up'?'▲':'▼'}</span></div>`;
            });
            tickerTrack.innerHTML = html + html;
        } catch (e) { console.error('Ticker error', e); }
    }
    fetchLiveRates();
    setInterval(fetchLiveRates, 60000);

    // --- Custom Asset Dropdown ---
    (function () {
        const wrap     = document.getElementById('asset-select-wrap');
        const trigger  = document.getElementById('asset-select-trigger');
        const dropdown = document.getElementById('asset-select-dropdown');
        const badge    = document.getElementById('asset-badge');
        const nameEl   = document.getElementById('asset-select-name');
        const options  = dropdown.querySelectorAll('.asset-option');

        function openDropdown() {
            wrap.classList.add('open');
            trigger.setAttribute('aria-expanded', 'true');
        }
        function closeDropdown() {
            wrap.classList.remove('open');
            trigger.setAttribute('aria-expanded', 'false');
        }

        trigger.addEventListener('click', () => {
            wrap.classList.contains('open') ? closeDropdown() : openDropdown();
        });
        trigger.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); wrap.classList.contains('open') ? closeDropdown() : openDropdown(); }
            if (e.key === 'Escape') closeDropdown();
        });

        options.forEach(opt => {
            opt.addEventListener('click', () => {
                const val   = opt.dataset.value;
                const logo  = opt.dataset.logo;
                const label = opt.dataset.label;

                // Update visible trigger — swap the logo img src
                badge.src = `https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons@master/svg/color/${logo}.svg`;
                badge.alt = val;
                nameEl.textContent = label;

                // Mark selected
                options.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');

                // Sync hidden select and fire change event (existing JS listens to this)
                productSelect.value = val;
                productSelect.dispatchEvent(new Event('change'));

                populateMinerFees();
                closeDropdown();
            });
        });

        // Close on outside click / scroll
        document.addEventListener('click', (e) => {
            if (!wrap.contains(e.target)) closeDropdown();
        });
        document.addEventListener('scroll', closeDropdown, { passive: true });
        
        if(minerFeeSelect) {
           minerFeeSelect.addEventListener('change', () => calculate('usd'));
        }
    })();

    // --- Custom Miner Fee Dropdown toggle ---
    (function() {
        const minerWrap    = document.getElementById('miner-fee-group');
        const minerTrigger = document.getElementById('miner-trigger');
        if(!minerTrigger) return;
        
        minerTrigger.addEventListener('click', () => {
            const isOpen = minerWrap.classList.contains('open');
            minerWrap.classList.toggle('open', !isOpen);
            minerTrigger.setAttribute('aria-expanded', String(!isOpen));
        });
        minerTrigger.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); minerTrigger.click(); }
            if (e.key === 'Escape') { minerWrap.classList.remove('open'); minerTrigger.setAttribute('aria-expanded', 'false'); }
        });
        document.addEventListener('click', (e) => {
            if (!minerWrap.contains(e.target)) { minerWrap.classList.remove('open'); minerTrigger.setAttribute('aria-expanded', 'false'); }
        });
    })();
    // --- Auto-select asset from URL param (?product=ETH etc.) ---
    (function () {
        const param = new URLSearchParams(window.location.search).get('product');
        if (!param) return;
        const targetOpt = document.querySelector(`#asset-select-dropdown .asset-option[data-value="${param}"]`);
        if (targetOpt) targetOpt.click(); // triggers the existing click handler — updates badge, name, miner fees & live price
    })();

})();
</script>
</body>
</html>
