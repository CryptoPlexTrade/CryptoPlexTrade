        /* --- Main Content --- */
        .main-content { flex-grow: 1; padding: 60px 0; }
        .confirmation-wrapper {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; 
            box-shadow: 0 15px 35px var(--shadow-medium);
            animation: fade-in-up 0.8s ease-out;
            padding: 40px 50px; 
            border-image: linear-gradient(145deg, rgba(255,255,255,0.5), rgba(255,255,255,0.1), rgba(255,255,255,0.5)) 1;
        }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .confirmation-wrapper h1 { font-size: 2.5rem; color: var(--text-primary); margin-top: 0; margin-bottom: 30px; text-align: center; }

        /* Stepper */
        .stepper { display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; }
        .stepper-line { position: absolute; top: 19px; left: 10%; right: 10%; height: 4px; background: var(--border-light); z-index: 1; }
        .stepper-progress { position: absolute; top: 19px; left: 10%; height: 4px; background: var(--primary-color); z-index: 2; width: 0; transition: width 0.5s ease-in-out; }
        .step { display: flex; flex-direction: column; align-items: center; z-index: 3; background-color: var(--bg-light); padding: 0 10px; }
        .step-number { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-white); border: 3px solid var(--border-medium); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; font-weight: 700; margin-bottom: 10px; transition: all 0.4s ease; }
        .step-title { font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); }
        .step.active .step-number { border-color: var(--primary-color); background: var(--primary-color); color: white; transform: scale(1.1); box-shadow: 0 0 15px var(--shadow-blue); }
        .step.active .step-title { color: var(--primary-dark); }
        .step.completed .step-number { border-color: var(--accent-green); background: var(--accent-green); color: white; }
        .step.completed .step-title { color: var(--text-primary); }

        .form-group { position: relative; margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px 15px; border: 1px solid var(--border-medium); border-radius: 8px; font-size: 1rem; box-sizing: border-box; transition: border-color 0.3s ease, box-shadow 0.3s ease; background-color: var(--bg-white); }
        .form-group input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px var(--shadow-blue); }

        #confirm-payment-btn { width: 100%; margin-top: 10px; }

        #server-message { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; display: none; }
        #server-message.success { background-color: #e9f5ec; color: #28a745; }
        #server-message.error { background-color: #fbe9e7; color: #dc3545; }

        /* Success Animation */
        .success-animation { text-align: center; display: none; }
        .success-checkmark { width: 100px; height: 100px; margin: 20px auto; }
        .success-checkmark__circle { stroke-dasharray: 166; stroke-dashoffset: 166; stroke-width: 3; stroke-miterlimit: 10; stroke: var(--accent-green); fill: none; animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards; }
        .success-checkmark__check { transform-origin: 50% 50%; stroke-dasharray: 48; stroke-dashoffset: 48; stroke-width: 3; stroke: var(--accent-green); fill: none; animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards; }
        @keyframes stroke { 100% { stroke-dashoffset: 0; } }

        /* --- Ticker Tape --- */
        .ticker-tape {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--text-primary);
            color: var(--bg-white);
            padding: 10px 0;
            z-index: 200;
            overflow: hidden;
            white-space: nowrap;
            border-top: 2px solid var(--primary-color);
        }
        .ticker-tape__track { display: inline-block; animation: scroll-ticker 40s linear infinite; }
        .ticker-tape__item { display: inline-flex; align-items: center; padding: 0 25px; font-size: 0.9rem; }
        .ticker-tape__item .pair { font-weight: 600; margin-right: 15px; color: var(--text-secondary); }
        .ticker-tape__item .price { font-weight: 500; margin-right: 10px; color: var(--bg-white); }
        .ticker-tape__item .change.up { color: var(--accent-green); }
        .ticker-tape__item .change.down { color: var(--accent-red); }
        @keyframes scroll-ticker { 0% { transform: translateX(0%); } 100% { transform: translateX(-50%); } }

<body>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            }
            const csrfToken = getCookie('csrf-token');

            let allTransactions = []; // Define at a higher scope if needed elsewhere

            const orderDetails = JSON.parse(localStorage.getItem('buyOrderDetails'));
            if (!orderDetails) {
                window.location.href = 'login.html';
                return;
            }

            // Logout
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    await fetch('/api/logout', { method: 'POST', headers: { 'X-CSRF-Token': csrfToken } });
                    localStorage.removeItem('buyOrderDetails');
                    window.location.href = 'login.html';
                });
            }

            // Form Submission Logic
            const txForm = document.getElementById('transaction-id-form');
            const serverMessageDiv = document.getElementById('server-message');

            txForm.addEventListener('submit', async function(event) {
                event.preventDefault();
                const transactionId = document.getElementById('transaction-id').value;
                if (!transactionId.trim()) {
                    alert('Please enter a transaction ID.');
                    return;
                }

                const finalOrderData = { ...orderDetails, transactionId: transactionId.trim() };

                try {
                    const response = await fetch('/api/orders/create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                        body: JSON.stringify(finalOrderData)
                    });

                    const result = await response.json();

                    if (response.status === 401 || response.status === 403) {
                        window.location.href = 'login.html';
                        return;
                    }

                    if (response.ok) {
                        txForm.style.display = 'none';
                        document.querySelector('.confirmation-wrapper h1').textContent = 'Submission Complete!';
                        document.querySelector('.success-animation').style.display = 'block';

                        localStorage.removeItem('buyOrderDetails'); // Clean up

                        setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);
                    } else {
                        throw new Error(result.message || 'An unknown error occurred.');
                    }
                } catch (error) {
                    serverMessageDiv.textContent = `Error: ${error.message}`;
                    serverMessageDiv.className = 'error';
                    serverMessageDiv.style.display = 'block';
                }
            });

            // --- Ticker Tape Logic ---
            const tickerTrack = document.querySelector('.ticker-tape__track');
            if (tickerTrack) {
                const coinSymbols = ['BTC', 'ETH', 'SOL', 'BNB', 'XRP', 'LTC', 'ADA', 'DOGE'];
                const vsCurrency = 'usd';

                function updateTicker(data) {
                    let itemsHTML = '';
                    coinSymbols.forEach(symbol => {
                        const coinData = data.RAW[symbol]?.[vsCurrency.toUpperCase()];
                        if (!coinData) return;

                        const price = coinData.PRICE;
                        const change = coinData.CHANGEPCT24HOUR;
                        const dir = change >= 0 ? 'up' : 'down';
                        const sign = dir === 'up' ? '+' : '';
                        const arrow = dir === 'up' ? '▲' : '▼';
                        const pair = `${symbol}/USD`;

                        itemsHTML += `
                            <div class="ticker-tape__item" data-pair="${symbol}">
                                <span class="pair">${pair}</span>
                                <span class="price">${price.toLocaleString('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 })}</span>
                                <span class="change ${dir}">${sign}${change.toFixed(2)}% ${arrow}</span>
                            </div>
                        `;
                    });
                    tickerTrack.innerHTML = itemsHTML + itemsHTML;
                }

                async function fetchLiveRates() {
                    try {
                        const apiUrl = `https://min-api.cryptocompare.com/data/pricemultifull?fsyms=${coinSymbols.join(',')}&tsyms=${vsCurrency.toUpperCase()}`;
                        const response = await fetch(apiUrl);
                        if (!response.ok) throw new Error(`CryptoCompare API error: ${response.status}`);
                        const data = await response.json();
                        updateTicker(data);
                    } catch (error) { console.error("Failed to fetch ticker data:", error); }
                }
                fetchLiveRates();
                setInterval(fetchLiveRates, 60000);
            }
        });
    </script>
