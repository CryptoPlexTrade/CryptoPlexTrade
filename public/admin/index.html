    <script src="admin.js"></script>
    <script>
        // Mobile sidebar toggle
        const menuBtn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('admin-sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const closeBtn = document.getElementById('sidebar-close-btn');
        function openSidebar() {
            sidebar.classList.add('sidebar-open');
            overlay.classList.add('show');
            overlay.style.display = 'block';
        }
        function closeSidebar() {
            sidebar.classList.remove('sidebar-open');
            overlay.classList.remove('show');
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        }
        menuBtn.addEventListener('click', openSidebar);
        closeBtn.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', closeSidebar);
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const response = await fetch('/api/admin/stats', { credentials: 'include' });
                if (response.status === 401 || response.status === 403) {
                    window.location.href = '/admin-login'; // Redirect to admin login
                    return;
                }
                if (!response.ok) throw new Error('Failed to fetch stats');

                const stats = await response.json();
                document.getElementById('stats-users').textContent = stats.users;
                document.getElementById('stats-orders').textContent = stats.orders;
                document.getElementById('stats-tickets').textContent = stats.openTickets;

            } catch (error) {
                console.error('Error fetching dashboard stats:', error);
                document.querySelector('.stats-grid').innerHTML = '<p class="error-message">Could not load dashboard stats.</p>';
            }
        });
    </script>
