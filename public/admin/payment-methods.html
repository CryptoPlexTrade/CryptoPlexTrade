<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../css/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Methods - Admin</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        .pm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px; }
        .pm-card {
            background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
            padding: 28px; box-shadow: 0 2px 12px rgba(0,91,170,.06);
        }
        .pm-card h3 {
            font-size: .95rem; font-weight: 700; color: #1e293b; margin-bottom: 18px;
            padding-bottom: 12px; border-bottom: 2px solid #f0f7ff;
            display: flex; align-items: center; gap: 10px;
        }
        .pm-card h3 .icon-circle {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .pm-card h3 .icon-circle svg { width: 18px; height: 18px; color: #fff; }
        .icon-momo { background: linear-gradient(135deg, #f7931a, #fbbf24); }
        .icon-bank { background: linear-gradient(135deg, #005baa, #00a9e0); }
        .pm-field { margin-bottom: 16px; }
        .pm-field label {
            display: block; font-size: .72rem; font-weight: 700; color: #64748b;
            text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px;
        }
        .pm-field input {
            width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 9px;
            font-family: 'Poppins', sans-serif; font-size: .9rem; color: #1e293b;
            background: #fafcff; outline: none; transition: border-color .2s, box-shadow .2s;
        }
        .pm-field input:focus {
            border-color: #005baa; background: #fff; box-shadow: 0 0 0 3px rgba(0,91,170,.09);
        }
        .pm-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px; }
        .btn-save {
            background: linear-gradient(90deg, #005baa, #00a9e0); color: #fff;
            padding: 11px 28px; border: none; border-radius: 9px; font-family: 'Poppins', sans-serif;
            font-size: .88rem; font-weight: 600; cursor: pointer;
            transition: transform .2s, box-shadow .2s;
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,91,170,.18); }
        .btn-save:disabled { opacity: .55; cursor: not-allowed; transform: none; }
        .save-msg {
            display: none; padding: 12px 16px; border-radius: 9px; font-size: .85rem;
            font-weight: 500; margin-bottom: 20px;
        }
        .save-msg.success { display: block; background: rgba(40,167,69,.08); color: #16a34a; border: 1px solid rgba(40,167,69,.2); }
        .save-msg.error { display: block; background: rgba(220,53,69,.07); color: #dc3545; border: 1px solid rgba(220,53,69,.2); }
        .last-updated { font-size: .78rem; color: #94a3b8; font-style: italic; margin-top: 4px; }
        @media (max-width: 768px) {
            .pm-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <script src="admin.js"></script>
    <script>
        // Mobile sidebar toggle
        const menuBtn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('admin-sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const closeBtn = document.getElementById('sidebar-close-btn');
        function openSidebar() { sidebar.classList.add('sidebar-open'); overlay.classList.add('show'); overlay.style.display = 'block'; }
        function closeSidebar() { sidebar.classList.remove('sidebar-open'); overlay.classList.remove('show'); setTimeout(() => { overlay.style.display = 'none'; }, 300); }
        menuBtn.addEventListener('click', openSidebar);
        closeBtn.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', closeSidebar);
    </script>
    <script>
        const momoNameInput    = document.getElementById('momo-name');
        const momoNumberInput  = document.getElementById('momo-number');
        const bankNameInput    = document.getElementById('bank-name');
        const bankAccNameInput = document.getElementById('bank-account-name');
        const bankAccNumInput  = document.getElementById('bank-account-number');
        const saveBtn          = document.getElementById('save-btn');
        const saveMsg          = document.getElementById('save-msg');
        const lastUpdatedEl    = document.getElementById('last-updated');

        // Load current payment methods
        async function loadPaymentMethods() {
            try {
                const res = await fetch('/api/admin/payment-methods', { credentials: 'include' });
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/admin-login';
                    return;
                }
                const data = await res.json();
                momoNameInput.value    = data.momo?.recipientName || '';
                momoNumberInput.value  = data.momo?.number || '';
                bankNameInput.value    = data.bank?.bankName || '';
                bankAccNameInput.value = data.bank?.accountName || '';
                bankAccNumInput.value  = data.bank?.accountNumber || '';
                if (data.updatedAt) {
                    lastUpdatedEl.textContent = `Last updated: ${new Date(data.updatedAt).toLocaleString()}`;
                }
            } catch (err) {
                console.error('Error loading payment methods:', err);
            }
        }

        // Save payment methods
        saveBtn.addEventListener('click', async () => {
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';
            saveMsg.className = 'save-msg';
            saveMsg.style.display = 'none';

            try {
                const res = await fetch('/api/admin/payment-methods', {
                    method: 'PUT',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        momo: {
                            recipientName: momoNameInput.value.trim(),
                            number: momoNumberInput.value.trim()
                        },
                        bank: {
                            bankName: bankNameInput.value.trim(),
                            accountName: bankAccNameInput.value.trim(),
                            accountNumber: bankAccNumInput.value.trim()
                        }
                    })
                });

                const result = await res.json();
                if (!res.ok) throw new Error(result.message || 'Failed to save.');

                saveMsg.textContent = '✓ ' + result.message;
                saveMsg.className = 'save-msg success';
                saveMsg.style.display = 'block';
                if (result.data?.updatedAt) {
                    lastUpdatedEl.textContent = `Last updated: ${new Date(result.data.updatedAt).toLocaleString()}`;
                }
            } catch (err) {
                saveMsg.textContent = '✗ ' + (err.message || 'An error occurred.');
                saveMsg.className = 'save-msg error';
                saveMsg.style.display = 'block';
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save Payment Details';
                setTimeout(() => { saveMsg.style.display = 'none'; }, 5000);
            }
        });

        loadPaymentMethods();
    </script>
