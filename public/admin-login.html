<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CryptoPlexTrade</title>
    <link rel="stylesheet" href="admin/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <!-- For icons -->
<link rel="stylesheet" href="/css/responsive.css">
</head>
<body class="admin-login-body">
    <main class="login-split-layout">
        <div class="login-split-layout__left">
            <div class="logo-wrapper">
                <div class="logo">CE</div>
                <span class="logo-name">CryptoPlexTrade</span>
            </div>
            <h1>Admin Control Panel</h1>
            <p>Manage users, transactions, and platform settings with powerful tools at your fingertips.</p>
        </div>

        <div class="login-split-layout__right">
            <div class="form-container">
                <div class="form-header">
                    <h2>Administrator Login</h2>
                    <p>Please authenticate to continue.</p>
                </div>

                <div id="server-error" class="error-message"></div>

                <form id="login-form" novalidate>
                    <div class="form-group">
                        <div class="input-container">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="email" name="email" required placeholder=" ">
                            <label for="email">Email Address</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-container">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="password" name="password" required placeholder=" ">
                            <label for="password">Password</label>
                            <span class="password-toggle" data-target="password">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-btn">
                        <span class="btn-text">Secure Login</span>
                        <span class="btn-loader">
                            <i class="fas fa-spinner fa-spin"></i>
                        </span>
                    </button>
                </form>
                <div class="card-footer">
                    <p>For security reasons, please log out when finished.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Password Visibility Toggle
        document.querySelectorAll('.password-toggle').forEach(toggle => {
            toggle.addEventListener('click', function() {
                const targetInput = document.getElementById(this.dataset.target);
                const icon = this.querySelector('i');
                
                if (targetInput.type === 'password') {
                    targetInput.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    targetInput.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        });

        // Form Submission Logic
        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const submitBtn = this.querySelector('.login-btn');
            const btnText = submitBtn.querySelector('.btn-text');
            const btnLoader = submitBtn.querySelector('.btn-loader');
            
            // Show loading state
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-block';
            submitBtn.disabled = true;
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const serverErrorDiv = document.getElementById('server-error');
            serverErrorDiv.style.display = 'none';

            const formData = { email, password, isAdminLogin: true };

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(formData),
            })
            .then(response => response.json().then(data => ({ status: response.status, body: data })))
            .then(({ status, body }) => {
                if (status === 200) {
                    if (body.role === 'admin') {
                        window.location.href = '/admin/index.html';
                    } else {
                        serverErrorDiv.textContent = 'Access denied. This portal is for administrators only.';
                        serverErrorDiv.style.display = 'block';
                    }
                } else {
                    // Show the specific error message from the server
                    serverErrorDiv.textContent = body.message || 'Invalid credentials or access denied.';
                    serverErrorDiv.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Fetch Error:', error);
                serverErrorDiv.textContent = 'Could not connect to the server. Please try again later.';
                serverErrorDiv.style.display = 'block';
            })
            .finally(() => {
                // Reset button state
                btnText.style.display = 'inline-block';
                btnLoader.style.display = 'none';
                submitBtn.disabled = false;
            });
        });

        // Input focus effects
        document.querySelectorAll('.input-container input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });
        });
    </script>
</body>
</html>
