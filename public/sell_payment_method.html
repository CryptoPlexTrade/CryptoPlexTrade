<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="css/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 2: Payout Details - CryptoPlexTrade</title>
    <style>
        :root {
            --primary-color: #005baa; --primary-dark: #004a8a; --secondary-color: #00a9e0; --bg-highlight: #f0f7ff;
            --bg-white: #ffffff; --bg-light: #f8fafc; --border-light: #e2e8f0; --border-medium: #cbd5e1;
            --text-secondary: #64748b; --text-body: #475569; --text-primary: #1e293b;
            --accent-green: #28a745; --accent-red: #dc3545;
            --shadow-subtle: rgba(0, 0, 0, 0.05); --shadow-medium: rgba(0, 0, 0, 0.1); --shadow-blue: rgba(0, 91, 170, 0.2);
        }
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { 
            font-family: 'Poppins', sans-serif; color: var(--text-body); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; 
            background: linear-gradient(-45deg, #f0f7ff, #e2e8f0, #f0f7ff, #00a9e0); background-size: 400% 400%; animation: gradientBG 20s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        .header { padding: 20px 0; background: transparent; position: sticky; top: 0; z-index: 100; }
        .logo-wrapper { display: flex; align-items: center; text-decoration: none; }
        .logo-name {
            font-size: 1.8rem; font-weight: 700; color: var(--text-primary);
            text-decoration: none; margin-left: 12px;
        }
        .header .container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; }
        .logo { font-size: 1.8rem; font-weight: 700; color: var(--text-primary); text-decoration: none; }
        .logo { text-decoration: none; }
        img.logo { width: auto; height: 44px; border-radius: 16px; object-fit: contain; background: none; box-shadow: none; }
        .logo:hover { transform: scale(1.1); }
        .nav a { color: var(--text-body); text-decoration: none; margin-left: 30px; font-weight: 400; transition: color 0.3s ease; }
        .nav a:hover { color: var(--primary-color); }
        .btn-primary { background: linear-gradient(45deg, var(--primary-color), var(--secondary-color)); background-size: 200% 200%; color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: 600; transition: transform 0.3s ease, box-shadow 0.3s ease; border: none; animation: gradient-animation 8s ease infinite; cursor: pointer; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--shadow-blue); }
        @keyframes gradient-animation { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .main-content { flex-grow: 1; padding: 60px 0; }
        .confirmation-wrapper {
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; box-shadow: 0 15px 35px var(--shadow-medium); animation: fade-in-up 0.8s ease-out;
            padding: 40px 50px; border-image: linear-gradient(145deg, rgba(255,255,255,0.5), rgba(255,255,255,0.1), rgba(255,255,255,0.5)) 1;
        }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .confirmation-wrapper h1 { font-size: 2.5rem; color: var(--text-primary); margin-top: 0; margin-bottom: 30px; text-align: center; }
        .stepper { display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; }
        .stepper-line { position: absolute; top: 19px; left: 10%; right: 10%; height: 4px; background: var(--border-light); z-index: 1; }
        .stepper-progress { position: absolute; top: 19px; left: 10%; height: 4px; background: var(--primary-color); z-index: 2; width: 0; transition: width 0.5s ease-in-out; }
        .step { display: flex; flex-direction: column; align-items: center; z-index: 3; background-color: var(--bg-light); padding: 0 10px; }
        .step-number { width: 40px; height: 44px; border-radius: 50%; background: var(--bg-white); border: 3px solid var(--border-medium); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; font-weight: 700; margin-bottom: 10px; transition: all 0.4s ease; }
        .step-title { font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); }
        .step.active .step-number { border-color: var(--primary-color); background: var(--primary-color); color: white; transform: scale(1.1); box-shadow: 0 0 15px var(--shadow-blue); }
        .step.active .step-title { color: var(--primary-dark); }
        .step.completed .step-number { border-color: var(--accent-green); background: var(--accent-green); color: white; }
        .step.completed .step-title { color: var(--text-primary); }
        .payment-options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .payment-option-card { background: rgba(255,255,255,0.7); border: 2px solid var(--border-light); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .payment-option-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px var(--shadow-subtle); }
        .payment-option-card.selected { border-color: var(--primary-color); background: var(--bg-highlight); box-shadow: 0 0 15px var(--shadow-blue); }
        .payment-option-card svg { width: 40px; height: 44px; color: var(--primary-dark); margin-bottom: 10px; }
        .payment-option-card h3 { margin: 0; color: var(--text-primary); }
        .payout-details-form { margin-top: 20px; animation: slide-down 0.5s ease-out; }
        @keyframes slide-down { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .form-group { position: relative; margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px 15px; border: 1px solid var(--border-medium); border-radius: 8px; font-size: 1rem; box-sizing: border-box; transition: border-color 0.3s ease, box-shadow 0.3s ease; background-color: var(--bg-white); }
        .form-group input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px var(--shadow-blue); }
        #submit-sell-order-btn { width: 100%; margin-top: 30px; }
        .deposit-address-section { margin-top: 40px; text-align: center; }
        .deposit-address-box { background-color: var(--bg-highlight); padding: 20px; border-radius: 12px; border: 1px dashed var(--primary-color); }
        .deposit-address-box .label { font-weight: 600; color: var(--text-secondary); }
        .deposit-address-box .address { font-family: 'Courier New', Courier, monospace; font-weight: 600; color: var(--primary-dark); word-break: break-all; margin: 10px 0; font-size: 1.1rem; }
        #server-message { padding: 15px; border-radius: 8px; margin-top: 20px; font-weight: 500; display: none; }
        #server-message.success { background-color: #e9f5ec; color: #28a745; }
        #server-message.error { background-color: #fbe9e7; color: #dc3545; }
    </style>
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo-wrapper">
                <img src="css/logo.jpg" alt="Logo" class="logo" style="width: auto !important; height: 44px !important; max-height: 44px; border-radius: 16px !important; object-fit: contain !important; background: none !important; box-shadow: none !important; overflow: visible !important;">
                <span class="logo-name">CryptoPlexTrade</span>
            </a>
            <nav class="nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="#">Help</a>
                <a href="#" id="logout-btn">Logout</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="confirmation-wrapper">
                <h1>Enter Payout Details</h1>

                <div class="stepper">
                    <div class="stepper-line"><div class="stepper-progress" style="width: 100%;"></div></div>
                    <div class="step completed">
                        <div class="step-number">1</div>
                        <div class="step-title">Verify Order</div>
                    </div>
                    <div class="step active">
                        <div class="step-number">2</div>
                        <div class="step-title">Enter Payout Details</div>
                    </div>
                </div>

                <div class="deposit-address-section">
                    <h3>Step 1: Send Your Crypto</h3>
                    <div class="deposit-address-box">
                        <div class="label" id="deposit-label">Please send the exact amount to the address below:</div>
                        <p class="address" id="deposit-address">bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh</p>
                    </div>
                </div>

                <form id="payout-form" style="margin-top: 40px;">
                    <h3>Step 2: Tell Us Where to Send Your GHS</h3>
                    <div class="payment-options">
                        <div class="payment-option-card" data-value="momo">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10.5 18.75a.75.75 0 0 0 0 1.5h3a.75.75 0 0 0 0-1.5h-3Z" /><path fill-rule="evenodd" d="M8.625.75A3.375 3.375 0 0 0 5.25 4.125v15.75a3.375 3.375 0 0 0 3.375 3.375h6.75a3.375 3.375 0 0 0 3.375-3.375V4.125A3.375 3.375 0 0 0 15.375.75h-6.75ZM7.5 4.125C7.5 3.504 8.004 3 8.625 3h6.75C15.996 3 16.5 3.504 16.5 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-6.75A1.125 1.125 0 0 1 7.5 19.875V4.125Z" clip-rule="evenodd" /></svg>
                            <h3>Mobile Money</h3>
                        </div>
                        <div class="payment-option-card" data-value="bank">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12.75 1.5a.75.75 0 0 0-1.5 0v2.25H9a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 9 21.75h6a2.25 2.25 0 0 0 2.25-2.25V6a2.25 2.25 0 0 0-2.25-2.25h-2.25V1.5ZM12 9.75a.75.75 0 0 0-1.5 0v4.5a.75.75 0 0 0 1.5 0v-4.5Z" /><path d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25V6H6a.75.75 0 0 0-.75.75v13.5a.75.75 0 0 0 .75.75h2.25v2.25H6A2.25 2.25 0 0 1 3.75 21V6Z" /><path d="M15.75 6h2.25A2.25 2.25 0 0 1 20.25 3.75H18V6h-.75a.75.75 0 0 0-.75.75v13.5a.75.75 0 0 0 .75.75H18v2.25h-2.25A2.25 2.25 0 0 1 13.5 21V6a2.25 2.25 0 0 1 2.25-2.25Z" /></svg>
                            <h3>Bank Account</h3>
                        </div>
                    </div>

                    <div id="momo-form" class="payout-details-form" style="display: none;">
                        <div class="form-group">
                            <label for="momo-number">Mobile Money Number</label>
                            <input type="tel" id="momo-number" name="momo-number">
                        </div>
                        <div class="form-group">
                            <label for="momo-name">Account Name</label>
                            <input type="text" id="momo-name" name="momo-name">
                        </div>
                    </div>

                    <div id="bank-form" class="payout-details-form" style="display: none;">
                        <div class="form-group">
                            <label for="bank-name">Bank Name</label>
                            <input type="text" id="bank-name" name="bank-name">
                        </div>
                        <div class="form-group">
                            <label for="account-name">Account Name</label>
                            <input type="text" id="account-name" name="account-name">
                        </div>
                        <div class="form-group">
                            <label for="account-number">Account Number</label>
                            <input type="text" id="account-number" name="account-number">
                        </div>
                    </div>

                    <button type="submit" id="submit-sell-order-btn" class="btn-primary" disabled>Submit Sell Order</button>
                    <div id="server-message"></div>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('authToken');
            const orderDetails = JSON.parse(localStorage.getItem('sellOrderDetails'));
            if (!token || !orderDetails) {
                window.location.href = 'login.html';
                return;
            }

            const paymentOptionCards = document.querySelectorAll('.payment-option-card');
            const momoForm = document.getElementById('momo-form');
            const bankForm = document.getElementById('bank-form');
            const submitBtn = document.getElementById('submit-sell-order-btn');
            const payoutForm = document.getElementById('payout-form');
            const serverMessageDiv = document.getElementById('server-message');
            let selectedPayoutMethod = '';

            paymentOptionCards.forEach(card => {
                card.addEventListener('click', function() {
                    paymentOptionCards.forEach(c => c.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedPayoutMethod = this.dataset.value;

                    if (selectedPayoutMethod === 'momo') {
                        momoForm.style.display = 'block';
                        bankForm.style.display = 'none';
                    } else if (selectedPayoutMethod === 'bank') {
                        momoForm.style.display = 'none';
                        bankForm.style.display = 'block';
                    }
                    submitBtn.disabled = false;
                });
            });

            payoutForm.addEventListener('submit', async function(event) {
                event.preventDefault();
                
                let payoutInfo = {};
                if (selectedPayoutMethod === 'momo') {
                    payoutInfo = {
                        method: 'momo',
                        number: document.getElementById('momo-number').value,
                        name: document.getElementById('momo-name').value
                    };
                    if (!payoutInfo.number || !payoutInfo.name) {
                        alert('Please fill all Mobile Money fields.');
                        return;
                    }
                } else if (selectedPayoutMethod === 'bank') {
                    payoutInfo = {
                        method: 'bank',
                        bankName: document.getElementById('bank-name').value,
                        accountName: document.getElementById('account-name').value,
                        accountNumber: document.getElementById('account-number').value
                    };
                    if (!payoutInfo.bankName || !payoutInfo.accountName || !payoutInfo.accountNumber) {
                        alert('Please fill all Bank Account fields.');
                        return;
                    }
                } else {
                    alert('Please select a payout method.');
                    return;
                }

                const finalSellOrder = { ...orderDetails, payoutInfo };

                try {
                    const response = await fetch('/api/orders/create-sell-order', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(finalSellOrder)
                    });

                    const result = await response.json();

                    if (response.ok) {
                        serverMessageDiv.textContent = 'Success! Your sell order has been submitted. You will be notified once the funds are sent. Redirecting to dashboard...';
                        serverMessageDiv.className = 'success';
                        serverMessageDiv.style.display = 'block';
                        localStorage.removeItem('sellOrderDetails');
                        setTimeout(() => { window.location.href = 'dashboard.html'; }, 4000);
                    } else {
                        throw new Error(result.message || 'An unknown error occurred.');
                    }
                } catch (error) {
                    serverMessageDiv.textContent = `Error: ${error.message}`;
                    serverMessageDiv.className = 'error';
                    serverMessageDiv.style.display = 'block';
                }
            });

            // Logout
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('sellOrderDetails');
                    window.location.href = 'login.html';
                });
            }
        });
    </script>

</body>
</html>
