<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

<div class="app-shell">

    <!-- ===== SIDEBAR ===== -->

            <span class="sidebar-brand__name">CryptoPlexTrade</span>
        </a>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M11.47 3.841a.75.75 0 0 1 1.06 0l8.69 8.69a.75.75 0 1 0 1.06-1.061l-8.689-8.69a2.25 2.25 0 0 0-3.182 0l-8.69 8.69a.75.75 0 1 0 1.061 1.06l8.69-8.689Z"/><path d="m12 5.432 8.159 8.159c.03.03.06.058.091.086v6.198c0 1.035-.84 1.875-1.875 1.875H15a.75.75 0 0 1-.75-.75v-4.5a.75.75 0 0 0-.75-.75h-3a.75.75 0 0 0-.75.75V21a.75.75 0 0 1-.75.75H5.625a1.875 1.875 0 0 1-1.875-1.875v-6.198a2.29 2.29 0 0 0 .091-.086L12 5.432Z"/></svg>
                    Dashboard
                </a></li>
                <li><a href="trade.html">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3 4.5h18v15H3v-15Zm6.75 10.5a.75.75 0 0 0-1.5 0v1.5a.75.75 0 0 0 1.5 0v-1.5ZM12 15a.75.75 0 0 0-1.5 0v1.5a.75.75 0 0 0 1.5 0v-1.5ZM15.75 15a.75.75 0 0 0-1.5 0v1.5a.75.75 0 0 0 1.5 0v-1.5ZM9.75 9a.75.75 0 0 0-1.5 0v4.5a.75.75 0 0 0 1.5 0V9Zm3.75-3a.75.75 0 0 0-1.5 0v7.5a.75.75 0 0 0 1.5 0V6Zm2.25 1.5a.75.75 0 0 0-1.5 0v6a.75.75 0 0 0 1.5 0v-6Z"/></svg>
                    Trade
                </a></li>
                <li><a href="transactions.html">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25ZM12.75 6a.75.75 0 0 0-1.5 0v6c0 .414.336.75.75.75h4.5a.75.75 0 0 0 0-1.5h-3.75V6Z" clip-rule="evenodd"/></svg>
                    Transactions
                </a></li>
                <li><a href="profile.html" class="active">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z" clip-rule="evenodd"/></svg>
                    Profile
                </a></li>
                <li><a href="support.html">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12Zm11.378-3.917c-.89-.777-2.366-.777-3.255 0a.75.75 0 0 1-1.06-1.06c2.298-2.013 5.824-2.013 8.122 0a.75.75 0 0 1-1.06 1.06ZM12 15.75a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z" clip-rule="evenodd"/></svg>
                    Support
                </a></li>
            </ul>
        </nav>
    </aside>

    <div class="main-wrap">
        <header class="topbar">
            <div class="topbar-left">
                <button class="hamburger-btn" id="hamburger-btn" aria-label="Toggle sidebar">
                    <span></span><span></span><span></span>
                </button>
                <span class="topbar-title">My Profile</span>
            </div>
            <div class="topbar-right">
                <a href="#" id="logout-btn" class="btn btn-danger btn-sm">Logout</a>
            </div>
        </header>

        <main class="page-content">
            <div class="page-header">
                <h1>My Profile</h1>
                <p>Manage your personal information and account security.</p>
            </div>

            <div class="grid-2">
                <!-- Profile Info Card -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" style="width:18px;height:18px;vertical-align:-3px;margin-right:6px;color:var(--primary);"><path d="M10 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM3.465 14.493a1.23 1.23 0 0 0 .41 1.412A9.957 9.957 0 0 0 10 18c2.31 0 4.438-.784 6.131-2.1.43-.333.604-.903.408-1.41a7.002 7.002 0 0 0-13.074.003Z"/></svg>
                            Profile Information
                        </h3>
                    </div>
                    <form id="profile-form">
                        <div class="form-group">
                            <label for="fullname">Full Name</label>
                            <input type="text" id="fullname" name="fullname" required placeholder="Your full name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" disabled placeholder="Loading…">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" required placeholder="Your phone number">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <div id="profile-message" class="msg"></div>
                    </form>
                </div>

                <!-- Change Password Card -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" style="width:18px;height:18px;vertical-align:-3px;margin-right:6px;color:var(--primary);"><path fill-rule="evenodd" d="M10 1a4.5 4.5 0 0 0-4.5 4.5V9H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-.5V5.5A4.5 4.5 0 0 0 10 1Zm3 8V5.5a3 3 0 1 0-6 0V9h6Z" clip-rule="evenodd"/></svg>
                            Change Password
                        </h3>
                    </div>
                    <form id="password-form">
                        <div class="form-group">
                            <label for="current-password">Current Password</label>
                            <input type="password" id="current-password" name="current-password" required placeholder="Enter current password">
                        </div>
                        <div class="form-group">
                            <label for="new-password">New Password</label>
                            <input type="password" id="new-password" name="new-password" required placeholder="Enter new password">
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">Confirm New Password</label>
                            <input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirm new password">
                        </div>
                        <button type="submit" class="btn btn-primary">Change Password</button>
                        <div id="password-message" class="msg"></div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="ticker-tape"></div>

<script src="inactivity-timer.js"></script>
<script src="chat-widget.js"></script>
<script>
(function () {
    // --- Sidebar ---
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    document.getElementById('hamburger-btn').addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('open'); });
    overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); });

    // --- Cookie helper ---
    function getCookie(name) {
        const v = `; ${document.cookie}`, p = v.split(`; ${name}=`);
        if (p.length === 2) return p.pop().split(';').shift();
    }
    const csrfToken = getCookie('csrf-token');

    // --- Logout ---
    document.getElementById('logout-btn').addEventListener('click', async (e) => {
        e.preventDefault();
        try { const r = await fetch('/api/logout', { method: 'POST', headers: { 'X-CSRF-Token': csrfToken } }); if (r.ok) window.location.href = 'login.html'; }
        catch (err) { console.error(err); }
    });

    const fullnameInput   = document.getElementById('fullname');
    const emailInput      = document.getElementById('email');
    const phoneInput      = document.getElementById('phone');
    const profileForm     = document.getElementById('profile-form');
    const passwordForm    = document.getElementById('password-form');
    const profileMsg      = document.getElementById('profile-message');
    const passwordMsg     = document.getElementById('password-message');

    function showMsg(el, type, text) {
        el.textContent = text;
        el.className = `msg ${type}`;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    // --- Fetch profile ---
    async function fetchProfile() {
        try {
            const r = await fetch('/api/user/profile', { credentials: 'include' });
            if (r.status === 401 || r.status === 403) { window.location.href = 'login.html'; return; }
            if (!r.ok) throw new Error('Failed to fetch profile.');
            const user = await r.json();
            fullnameInput.value = user.fullname;
            emailInput.value    = user.email;
            phoneInput.value    = user.phone;
        } catch (e) { showMsg(profileMsg, 'error', e.message); }
    }
    fetchProfile();

    // --- Update profile ---
    profileForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            const r = await fetch('/api/user/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                body: JSON.stringify({ fullname: fullnameInput.value, phone: phoneInput.value })
            });
            const res = await r.json();
            if (!r.ok) throw new Error(res.message);
            showMsg(profileMsg, 'success', res.message);
        } catch (e) { showMsg(profileMsg, 'error', e.message); }
    });

    // --- Change password ---
    passwordForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const currentPassword = document.getElementById('current-password').value;
        const newPassword     = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        if (newPassword !== confirmPassword) { showMsg(passwordMsg, 'error', 'New passwords do not match.'); return; }
        try {
            const r = await fetch('/api/user/change-password', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                body: JSON.stringify({ currentPassword, newPassword })
            });
            const res = await r.json();
            if (!r.ok) throw new Error(res.message);
            showMsg(passwordMsg, 'success', res.message);
            passwordForm.reset();
        } catch (e) { showMsg(passwordMsg, 'error', e.message); }
    });
})();
</script>
</body>
</html>
